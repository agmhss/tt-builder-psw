<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGMHSS Smart Timetable Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .gradient-bg { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900">

    <nav class="gradient-bg p-6 shadow-xl text-white">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 id="schoolNameDisplay" class="text-2xl md:text-4xl font-black tracking-tight uppercase">GHSS VMPT</h1>
                <p class="text-blue-100 text-sm font-medium">Smart Timetable & Duty Engine</p>
            </div>
            <div id="statusIndicator" class="bg-blue-900/50 px-4 py-1.5 rounded-full border border-blue-400 text-xs font-bold tracking-widest">SYSTEM READY</div>
        </div>
    </nav>

    <div class="container mx-auto mt-6 px-4">
        <div class="glass p-4 rounded-xl border border-blue-200 shadow-sm">
            <h3 class="text-sm font-black text-blue-800 uppercase mb-3 flex items-center gap-2">
                <i data-lucide="bar-chart-2" class="w-4 h-4"></i> Class Period Allotment Tracker
            </h3>
            <div id="loadStatus" class="flex gap-2 flex-wrap">
                <span class="text-gray-400 text-xs italic">Sync data to load class status...</span>
            </div>
        </div>
    </div>

    <main class="container mx-auto px-4 py-8">
        
        <section class="glass rounded-2xl p-6 mb-8 shadow-lg border border-gray-200">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Operation Mode</label>
                    <select id="opMode" class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-xl font-bold focus:border-blue-500 outline-none">
                        <option value="regular">Regular Timetable</option>
                        <option value="exam">Exam Duty Mode</option>
                        <option value="substitution">Substitution Manager</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Calculation Mode</label>
                    <select id="calcMode" class="w-full p-3 bg-indigo-50 border-2 border-indigo-100 rounded-xl font-bold text-indigo-800 outline-none">
                        <option value="hybrid">Smart (Auto + Sheet)</option>
                        <option value="auto">Strict Auto (Rules)</option>
                        <option value="allotted">Strict Allotted</option>
                    </select>
                </div>

                <div id="examPatternGroup" class="hidden">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Pattern</label>
                    <select id="patternSelect" class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-xl outline-none">
                        <option value="Full School (1 to 12)">Full School (1-12)</option>
                        <option value="High & Hr.Sec Only (6 to 12)">High & Hr.Sec (6-12)</option>
                    </select>
                </div>

                <div id="substituteGroup" class="hidden">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Day of Substitution</label>
                    <select id="subDay" class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-xl outline-none">
                        <option value="Monday">Monday</option>
                        <option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option>
                        <option value="Thursday">Thursday</option>
                        <option value="Friday">Friday</option>
                    </select>
                </div>

                <div class="flex items-end">
                    <button onclick="generateGrid()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black p-3 rounded-xl shadow-lg flex items-center justify-center gap-2 transition-all">
                        <i data-lucide="refresh-cw" class="w-5 h-5"></i> PROCESS
                    </button>
                </div>
            </div>

            <div id="dailyToolsGroup" class="hidden mt-6 pt-6 border-t border-gray-200">
                <label class="block text-xs font-bold text-gray-500 uppercase mb-3">Absent Teachers / Date</label>
                <div class="flex flex-wrap gap-3" id="absentTeachersList"></div>
                <input type="date" id="workDate" class="mt-4 p-2 border rounded text-sm font-bold text-gray-700">
            </div>
        </section>

        <section class="glass rounded-2xl shadow-lg border border-gray-200 overflow-hidden">
            <div class="p-6 border-b border-gray-100 flex flex-wrap justify-between items-center gap-4">
                <h2 class="font-black text-xl text-blue-900">Smart Viewer</h2>
                <div class="flex gap-2">
                    <select id="viewType" class="bg-gray-100 p-2 rounded-lg text-sm font-bold">
                        <option value="all">All</option>
                        <option value="class">By Class</option>
                        <option value="teacher">By Teacher</option>
                    </select>
                    <select id="viewFilter" class="bg-gray-100 p-2 rounded-lg text-sm font-bold hidden"></select>
                    <button onclick="syncFromCloud()" class="bg-green-500 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-1">
                        <i data-lucide="cloud" class="w-4 h-4"></i> Sync
                    </button>
                    <button onclick="saveDutiesToCloud()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-1">
                        <i data-lucide="save" class="w-4 h-4"></i> Save Counts
                    </button>
                    <button onclick="exportPDF()" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-1">
                        <i data-lucide="download" class="w-4 h-4"></i> PDF
                    </button>
                </div>
            </div>
            <div id="mainGrid" class="p-6 min-h-[400px]">
                <div class="text-center py-20 text-gray-400 font-bold">
                    <i data-lucide="layout-grid" class="w-16 h-16 mx-auto mb-4 opacity-20"></i> 
                    Select options and Process to view matrix
                </div>
            </div>
        </section>
    </main>

    <div id="editModal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-6 w-11/12 max-w-md shadow-2xl border border-gray-200">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-black text-xl text-blue-900 flex items-center gap-2"><i data-lucide="edit-3" class="w-5 h-5"></i> Edit Period</h3>
                <button onclick="closeEditModal()" class="text-gray-400 hover:text-red-500 transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            
            <input type="hidden" id="editDay">
            <input type="hidden" id="editPeriod">
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Class Name(s)</label>
                    <input type="text" id="editClass" placeholder="e.g. 10-A or 12-A, 12-B" class="w-full p-2 border-2 border-gray-200 rounded-lg font-bold text-gray-800 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Subject</label>
                    <input type="text" id="editSubject" placeholder="e.g. ENGLISH" class="w-full p-2 border-2 border-gray-200 rounded-lg font-bold text-blue-700 focus:border-blue-500 outline-none uppercase">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Teacher</label>
                    <input type="text" id="editTeacher" placeholder="e.g. KS" class="w-full p-2 border-2 border-gray-200 rounded-lg font-bold text-gray-800 focus:border-blue-500 outline-none">
                </div>
            </div>
            
            <div class="flex justify-between items-center mt-6 pt-4 border-t border-gray-100">
                <button onclick="deleteCellData()" class="px-4 py-2 bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 rounded-lg font-bold text-sm transition-colors">Clear Cell</button>
                <div class="flex gap-2">
                    <button onclick="closeEditModal()" class="px-4 py-2 bg-gray-100 text-gray-700 hover:bg-gray-200 rounded-lg font-bold text-sm transition-colors">Cancel</button>
                    <button onclick="saveCellEdit()" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-black text-sm shadow-md transition-all">SAVE</button>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
        // Initialize Icons
        lucide.createIcons();
    </script>
</body>
</html>
